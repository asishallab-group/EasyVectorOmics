name: 'Install Fortran'
description: 'Installs all requirements to compile the Fortran code, meaning the compiler, needed libraries and the Fortran Package Manager'

inputs:
  compiler:
    description: 'Fortran compiler to install (gfortran, ifx)'
    required: true
    default: gfortran

runs:
  using: "composite"
  steps:
    - name: Install Intel compiler ifx
      if: ${{ inputs.compiler == 'ifx' }}
      shell: bash
      run: |
        pacman -Sy --needed --noconfirm gcc  # ifx needs some libs from gcc
        pacman -Scc --noconfirm
        curl https://registrationcenter-download.intel.com/akdlm/IRC_NAS/724303ca-6927-4327-a560-e0aabb55b010/intel-fortran-compiler-2025.3.1.16_offline.sh -o install_ifx.sh
        bash install_ifx.sh -a -s --eula accept
        source /opt/intel/oneapi/setvars.sh
        env | grep oneapi >> $GITHUB_ENV

    - name: Install GNU compiler gfortran
      if: ${{ inputs.compiler == 'gfortran' }}
      shell: bash
      run: |
        pacman -Sy --needed --noconfirm gcc-fortran
        pacman -Scc --noconfirm

    - name: Install needed libraries used in TensorOmics
      shell: bash
      run: |
        pacman -Sy --needed --noconfirm libzip xxhash
        pacman -Scc --noconfirm

    - name: Install fpm
      shell: bash
      run: |
        curl -L --output /usr/local/bin/fpm https://github.com/fortran-lang/fpm/releases/download/v0.13.0/fpm-0.13.0-linux-x86_64-gcc-12
        chmod a+x /usr/local/bin/fpm

    - name: Show version for reproducibility
      shell: bash
      run: ${{ inputs.compiler }} --version
