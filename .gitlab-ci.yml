stages:
  - run-tests
  - generate-docs

image: archlinux:latest
before_script:
  # install gfortran, python, pip, git
  - pacman -Sy --noconfirm archlinux-keyring
  - pacman -Syu --noconfirm
  - pacman -S --noconfirm gcc-fortran python python-pip git
  - pacman -Scc --noconfirm

  # install fpm
  - curl -L --output /usr/local/bin/fpm https://github.com/fortran-lang/fpm/releases/download/v0.12.0/fpm-0.12.0-linux-x86_64-gcc-12
  - chmod a+x /usr/local/bin/fpm

  # install ford
  - python -m venv .venv
  - source .venv/bin/activate
  - pip install --upgrade pip
  - pip install ford

  # set up git
  - git config --global user.email "ci-bot@yourdomain.com"
  - git config --global user.name "CI Bot"
  - |
    function git-push() {
      git add "${@:2}"
      git commit -m "$1 [skip ci]" || echo "No changes to commit"
      git push https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git HEAD:$CI_COMMIT_BRANCH
    }

  # show versions
  - echo "Versions:"
  - python --version
  - pip --version
  - ford --version
  - gfortran --version

run-tests:
  stage: run-tests
  rules:
    # trigger when pushing to main directly
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always

    # trigger only when a MR to 'main' is created
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main" && $CI_MERGE_REQUEST_DIFF_BASE_SHA == null'
      when: always

    # prevent running on other branches outside MR context
    - when: never
  script:
    - bash test_runner.sh

generate-docs:  # generate documentation after tests have passed
  stage: generate-docs
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: never
  needs:
    - job: run-tests
  script:
    # generate docs
    - ford ford.yml
    - echo "generated documentation successfully"

    # add and commit changes to docs folder
    - git-push "Update generated documentation" doc
