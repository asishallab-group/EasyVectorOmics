stages:
  - run-tests
  - generate-docs

image: archlinux:latest
before_script:
  # install gfortran, python, pip, git, xxhash, libzip, AND gcc
  - pacman -Sy --noconfirm archlinux-keyring
  - pacman -Syu --noconfirm
  - pacman -S --noconfirm gcc-fortran python python-pip git xxhash libzip pkg-config gcc
  - pacman -Scc --noconfirm

  # install fpm
  - curl -L --output /usr/local/bin/fpm https://github.com/fortran-lang/fpm/releases/download/v0.12.0/fpm-0.12.0-linux-x86_64-gcc-12
  - chmod a+x /usr/local/bin/fpm

  # install ford
  - python -m venv .venv
  - source .venv/bin/activate
  - pip install --upgrade pip
  - pip install ford

  # set up git
  - git config --global user.email "ci-bot@yourdomain.com"
  - git config --global user.name "CI Bot"
  - git remote set-url origin @gitlab.com/your-namespace/your-project.git
  - |
    function git-push() {
      git add -f "${@:2}"
      git commit -m "$1 [skip ci]" || echo "No changes to commit"
      git push https://oauth2:${JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git HEAD:$CI_COMMIT_BRANCH
    }

  # show versions
  - echo "Versions:"
  - python --version
  - pip --version
  - ford --version
  - gfortran --version
  - gcc --version  # Verify gcc is installed
  - pkg-config --version

  # Verify xxhash and libzip are installed
  - echo "Checking for xxhash library:"
  - pkg-config --exists libxxhash && echo "xxhash found" || echo "xxhash not found"
  - echo "Checking for libzip:"
  - pkg-config --exists libzip && echo "libzip found" || echo "libzip not found"

run-tests:
  stage: run-tests
  rules:
    # trigger when pushing to main directly, but only if src/ or test/ changed
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - src/**
        - test/**
        - test_runner.sh
        - build.sh
        - fpm.toml
      when: always

    # trigger only when a MR to 'main' is created and src/ or test/ changed
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - src/**
        - test/**
        - test_runner.sh
        - build.sh
        - fpm.toml
      when: always

    # prevent running on other branches outside MR context
    - when: never

  script:
    # install ifx
    - curl https://registrationcenter-download.intel.com/akdlm/IRC_NAS/466b0d65-e502-4172-9e06-24c565029b96/intel-fortran-compiler-2025.2.1.9_offline.sh -o install_ifx.sh
    - bash install_ifx.sh -a -s --eula accept
    - source /opt/intel/oneapi/setvars.sh

    # Set GCC for C compilation (lowercase 'gcc')
    - export CC=gcc

    # Verify the C compiler is set correctly
    - echo "C compiler set to: $CC"
    - which $CC

    # run tests using ifx for Fortran + gcc for C
    - echo "Run tests with ifx (Fortran) + gcc (C)"
    - FC=ifx CC=gcc bash test_runner.sh
    
    # run tests using gfortran
    - echo "Run tests with gfortran"
    - bash test_runner.sh

generate-docs:
  stage: generate-docs
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - src/**
        - test/**
        - ford.yml
        - fpm.toml
      when: always
    - when: never
  needs:
    - job: run-tests
      optional: true
  script:
    # generate docs
    - ford ford.yml
    - echo "generated documentation successfully"

    # add and commit changes to docs folder
    - git-push "Update generated documentation" doc